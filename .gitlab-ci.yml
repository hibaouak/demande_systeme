stages:
  - build
  - test
  - package

variables:
  IMAGE_NAME: "demandesystemms1"
  IMAGE_TAG: "v1"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

build_backend:        
  stage: build
  image: maven:3.8.4-openjdk-17
  script:
    - cd backend-ms1
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - backend-ms1/target/*.jar
    expire_in: 1 hour

test_backend:
  stage: test
  image: maven:3.8.4-openjdk-17
  services:
    - name: mysql:8.0
      alias: db_test
  variables:
    MYSQL_DATABASE: zyn
    MYSQL_ROOT_PASSWORD: root
    SPRING_DATASOURCE_URL: jdbc:mysql://db_test:3306/zyn?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    SPRING_DATASOURCE_USERNAME: root
    SPRING_DATASOURCE_PASSWORD: root
    SPRING_JPA_HIBERNATE_DDL_AUTO: update
    SPRING_KAFKA_ENABLED: "false"
  script:
    - cd backend-ms1
    - mvn test
  dependencies:
    - build_backend

push_to_dockerhub:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo "Connexion à Docker Hub..."
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
    - docker version
  script:
    - cd backend-ms1
    - echo "Construction de l'image..."
    - docker build -t $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG .
    - echo "Push de l'image vers Docker Hub..."
    - docker push $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG
  after_script:
    - docker logout
  dependencies:
    - build_backend
  only:
    - main
    - master