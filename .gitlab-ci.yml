stages:
  - build
  - test
  - package

variables:
  # Images names
  IMAGE_NAME: "demandesystemms1"
  IMAGE_TAG: "v1"
  
  # Docker configuration
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  
  # Maven options pour réduire les logs
  MAVEN_OPTS: "-Dorg.slf4j.simpleLogger.defaultLogLevel=WARN -Dmaven.test.redirectTestOutputToFile=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

# Cache des dépendances Maven pour accélérer les builds
cache:
  paths:
    - backend-ms1/.m2/repository/
  key: "$CI_BUILD_REF_NAME"

# ==================== BUILD JOB ====================

build_backend:        
  stage: build
  image: maven:3.8.4-openjdk-17
  script:
    - cd backend-ms1
    - echo "📦 Compilation du backend..."
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - backend-ms1/target/*.jar
    expire_in: 1 hour
  tags:
    - docker

# ==================== TEST JOB ====================

test_backend:
  stage: test
  image: maven:3.8.4-openjdk-17
  services:
    - name: mysql:8.0
      alias: db_test
  variables:
    # MySQL configuration
    MYSQL_DATABASE: zyn
    MYSQL_ROOT_PASSWORD: root
    MYSQL_TCP_PORT: 3306
    
    # Spring configuration
    SPRING_DATASOURCE_URL: jdbc:mysql://db_test:3306/zyn?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    SPRING_DATASOURCE_USERNAME: root
    SPRING_DATASOURCE_PASSWORD: root
    SPRING_JPA_HIBERNATE_DDL_AUTO: update
    SPRING_JPA_SHOW_SQL: "false"  # Désactive l'affichage SQL
    SPRING_KAFKA_ENABLED: "false"
    
    # Logging configuration
    LOGGING_LEVEL_ROOT: "WARN"
    LOGGING_LEVEL_COM_ZAXERER_HIKARI: "ERROR"
    LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: "ERROR"
    LOGGING_LEVEL_ORG_HIBERNATE: "ERROR"
  
  before_script:
    - apt-get update && apt-get install -y mysql-client netcat
    - echo "⏳ Attente que MySQL soit prêt..."
    - |
      timeout=60
      while ! nc -z db_test 3306 && [ $timeout -gt 0 ]; do
        echo "Attente MySQL... $timeout secondes restantes"
        timeout=$((timeout - 5))
        sleep 5
      done
    - echo "✅ MySQL est prêt !"
    - cd backend-ms1
  
  script:
    - echo "🧪 Exécution des tests..."
    - mvn $MAVEN_CLI_OPTS test || true  # Continue même si échec
    
  after_script:
    - echo "📊 Résumé des tests :"
    - |
      if [ -f target/surefire-reports/TEST-*.xml ]; then
        echo "✅ Des rapports de test ont été générés"
      else
        echo "⚠️ Aucun rapport de test trouvé"
      fi
  
  artifacts:
    when: always  # Sauvegarde même en cas d'échec
    paths:
      - backend-ms1/target/surefire-reports/
    reports:
      junit:
        - backend-ms1/target/surefire-reports/TEST-*.xml
    expire_in: 1 week
  
  dependencies:
    - build_backend
  tags:
    - docker

# ==================== DOCKER PUSH JOB ====================

push_to_dockerhub:
  stage: package
  image: docker:20.10.16
  services:
    - name: docker:20.10.16-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  
  before_script:
    - echo "🔑 Connexion à Docker Hub..."
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
    - docker version
    - echo "✅ Connecté en tant que $DOCKER_USER"
  
  script:
    - cd backend-ms1
    - echo "🏗️ Construction de l'image Docker..."
    - docker build -t $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG .
    - echo "📦 Image construite avec succès"
    - echo "🚀 Push de l'image vers Docker Hub..."
    - docker push $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG
    - echo "✅ Image poussée avec succès !"
  
  after_script:
    - docker logout
    - echo "🎉 Job package terminé !"
  
  dependencies:
    - build_backend
  needs:
    - test_backend  # Attend que les tests soient finis (même en échec)
  only:
    - main
    - master
  tags:
    - docker